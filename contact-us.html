<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="assets/bootstrap.min.css">
    <link rel="stylesheet" href="css/select.css">
    <style>
        /* Form Section Styles */
.form-section {
    padding: 40px 0;
    background-color: #ffffff;
}

.form-section .form-control {
    border-radius: 10px;
    border: 2px solid #e9ecef;
    padding: 15px;
    font-size: 1rem;
    transition: all 0.3s ease;
}

.form-section .form-control:focus {
    border-color: #007bff;
    box-shadow: 0 0 0 0.2rem rgba(0,123,255,0.25);
}

.form-section select.form-control {
    height: calc(51px + 2px);
}

.form-section .btn-primary {
    border: none;
    padding: 15px 40px;
    font-size: 1.1rem;
    font-weight: 600;
    border-radius: 50px;
    transition: all 0.3s ease;
}
.select2-container {
    width: 100% !important;
}

.select2-container--default .select2-selection--multiple {
    min-height: 53px;
    border: 1px solid #ced4da;
    border-radius: 0.375rem;
    padding: 9px 12px;
}


/* Fix row spacing in mobile */
@media (max-width: 768px) {
    .form-section {
        padding: 20px 10px;
    }

    .form-section h3 {
        font-size: 20px;
        text-align: center;
    }

    .form-section .row {
        margin: 0;
    }

    .form-section .col-12 {
        padding: 0;
        margin-bottom: 12px;
    }

    /* Button full width */
    .form-section .btn {
        width: 100%;
        font-size: 16px;
        padding: 12px;
    }
}
    </style>

</head>
<body>

    <div class="wrapper">
        <div id="header"></div>

<!-- Form Section -->
<section id="form-section" class="form-section">
  
    <div class="container px-3 px-md-0">
      <h3 style="margin-bottom: 12px;">Contact Us</h3>
        <form id="appointmentForm" role="form" class="php-email-form">
            <!-- Row 1 -->
            <div class="row">
                <div class="col-12 col-md-4 form-group">
                    <input type="text" name="name" class="form-control form-control-lg" id="name" placeholder="Your Name" required />
                </div>
                <div class="col-12 col-md-4 form-group">
                    <input type="email" class="form-control form-control-lg" name="email" id="email" placeholder="Your Email" required />
                </div>
                <div class="col-12 col-md-4 form-group">
                    <input type="tel" class="form-control form-control-lg" name="phone" id="phone" placeholder="Your Phone" required />
                </div>
            </div>

            <!-- Row 2 -->
            <div class="row mt-3">
                <div class="col-12 col-md-4 form-group">
                    <input name="city" id="city" placeholder="Full Address" required class="form-control form-control-lg" />
                </div>

               

                <div class="col-12 col-md-4 form-group">
                    <select name="doctor" id="doctor" class="form-control js-select2" multiple required>
                        <option value="Residential Construction">Residential Construction</option>
                        <option value="Commercial Construction">Commercial Construction</option>
                        <option value="Interior Design">Interior Design</option>
                        <option value="Exterior Design">Exterior Design</option>
                        <option value="2D Planning">2D Planning</option>
                        <option value="3D Elevation">3D Elevation</option>
                        <option value="Renovation">Renovation</option>
                        <option value="Vastu Planning">Vastu Planning</option>
                        <option value="Waterproofing">Waterproofing</option>
                    </select>
                </div>
            </div>

            <!-- Row 3 -->
            <div class="row mt-3">
                <div class="col-12 form-group">
                    <textarea class="form-control form-control-lg" name="message" rows="5" placeholder="Message (Optional)"></textarea>
                </div>
            </div>

            <div class="mt-4 text-center">
                <button id="submit_appointment" type="submit" class="btn btn-primary btn-lg px-5 py-2">
                    Submit 
                </button>
            </div>
        </form>
    </div>
</section>




<!-- jQuery -->
<div id="footer"></div>

</div>

<!-- jQuery (already have) -->
<script src="assets/jquery-3.2.1.min.js"></script>
<script src="assets/bootstrap.bundle.min.js"></script>
<script src="assets/mmenu.js"></script>
<script src="js/index.js"></script>
<script src="js/select.js"></script>

<script>
$(document).ready(function () {
    // Initialize Select2
    $('.js-select2').each(function () {
    $(this).select2({
        placeholder: "Select Products and Services",
        closeOnSelect: false,
        allowClear: true,
        width: '100%',
        dropdownParent: $(this).parent()  
    });
});


    
    

    // Form submission
    document.getElementById("submit_appointment").addEventListener("click", function (e) {
        e.preventDefault();

        const submitBtn = this;
        submitBtn.disabled = true;
        submitBtn.textContent = "Submitting...";

        const selectedProductsArray = $('#doctor').val() || [];
        const selectedProducts = selectedProductsArray.join(", ");

        const formData = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value,
            city: document.getElementById("city").value,
            doctor: selectedProducts,
            message: document.querySelector("textarea[name='message']").value,
        };

        fetch("https://script.google.com/macros/s/AKfycbx9r5jnJ6n9GX0bJ2GRQ1rt1FQglic3qXwXWL4tX495I3vaf3gffRSkc7CQ9ZmEqp5CEg/exec", {
            method: "POST",
            body: JSON.stringify(formData),
            headers: { "Content-Type": "application/json" },
            mode:'no-cors'
        })
        .then(() => window.location.reload())
        .catch(() => window.location.reload());
    });
});
</script>

</body>
</html>
