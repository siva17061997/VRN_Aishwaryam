    <style>

        /* MASONRY GRID */
        .gallery {
          column-count: 4;
          column-gap: 15px;
        }
        
        .gallery img {
          width: 100%;
          margin-bottom: 15px;
          border-radius: 10px;
          cursor: pointer;
          transition: 0.3s;
        }
        
        .gallery img:hover {
          transform: scale(1.03);
        }
        
        /* RESPONSIVE */
        @media (max-width: 992px) {
          .gallery { column-count: 3; }
        }
        @media (max-width: 768px) {
          .gallery { column-count: 2; }
        }
        @media (max-width: 576px) {
          .gallery { column-count: 1; }
        }
        
        /* MODAL IMAGE */
        .modal-img {
          max-height: 80vh;
          transition: transform 0.3s;
        }
        
        /* ZOOM */
        .zoomed {
          transform: scale(1.8);
          cursor: zoom-out;
        }
        
        </style>

</head>
