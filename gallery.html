<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/coustom.css">
    <link rel="stylesheet" href="css/customresponsive.css">
    <link rel="stylesheet" href="assets/bootstrap.min.css">
    <link rel="stylesheet" href="assets/slick.css">
    <link rel="stylesheet" href="assets/slick-theme.css">
    <style>

        /* MASONRY GRID */
        .gallery {
          column-count: 4;
          column-gap: 15px;
        }
        
        .gallery img {
          width: 100%;
          margin-bottom: 15px;
          border-radius: 10px;
          cursor: pointer;
          transition: 0.3s;
        }
        
        .gallery img:hover {
          transform: scale(1.03);
        }
        
        /* RESPONSIVE */
        @media (max-width: 992px) {
          .gallery { column-count: 3; }
        }
        @media (max-width: 768px) {
          .gallery { column-count: 2; }
        }
        @media (max-width: 576px) {
          .gallery { column-count: 1; }
        }
        
        /* MODAL IMAGE */
        .modal-img {
          max-height: 80vh;
          transition: transform 0.3s;
        }
        
        /* ZOOM */
        .zoomed {
          transform: scale(1.8);
          cursor: zoom-out;
        }
        
        </style>

</head>
<body>
  <div class="wrapper">
    <div id="header"></div>


    <div class="container py-5">
        <h2 class="text-center fw-bold mb-4">Our Gallery</h2>
      
        <!-- MASONRY GRID -->
        <div class="gallery">
      
          <img src="images/vrn1.jpeg" onclick="openModal(0)">
          <img src="images/vrn2.jpeg" onclick="openModal(1)">
          <img src="images/vrn3.jpeg" onclick="openModal(2)">
          <img src="images/vrn4.jpeg" onclick="openModal(3)">
          <img src="images/vrn5.jpeg" onclick="openModal(4)">
          <img src="images/vrn6.jpeg" onclick="openModal(5)">
          <img src="images/vrn7.jpeg" onclick="openModal(6)">
          <img src="images/vrn8.jpeg" onclick="openModal(7)">
          <img src="images/vrn9.jpeg" onclick="openModal(8)">
          <img src="images/vrn10.jpeg" onclick="openModal(9)">
          <img src="images/vrn11.jpeg" onclick="openModal(10)">
          <img src="images/vrn12.jpeg" onclick="openModal(11)">
          <img src="images/vrn13.jpeg" onclick="openModal(12)">
          <img src="images/vrn14.jpeg" onclick="openModal(13)">
          <img src="images/vrn15.jpeg" onclick="openModal(14)">
          <img src="images/vrn16.jpeg" onclick="openModal(15)">
          <img src="images/vrn17.jpeg" onclick="openModal(16)">
          <img src="images/vrn18.jpeg" onclick="openModal(17)">
          <img src="images/vrn19.jpeg" onclick="openModal(18)">
          <img src="images/vrn20.jpeg" onclick="openModal(19)">
          <img src="images/vrn21.jpeg" onclick="openModal(20)">
          <img src="images/vrn22.jpeg" onclick="openModal(21)">
          <img src="images/vrn23.jpeg" onclick="openModal(22)">
          <img src="images/vrn24.jpeg" onclick="openModal(23)">
          <img src="images/vrn25.jpeg" onclick="openModal(24)">
          <img src="images/vrn26.jpeg" onclick="openModal(25)">
          <img src="images/vrn27.jpeg" onclick="openModal(26)">
          <img src="images/vrn28.jpeg" onclick="openModal(27)">
          <img src="images/vrn29.jpeg" onclick="openModal(28)">
          
      
        </div>
      </div>
      
      <!-- MODAL -->
      <div class="modal fade" id="galleryModal">
        <div class="modal-dialog modal-dialog-centered modal-xl">
          <div class="modal-content bg-dark border-0">
      
            <div class="modal-body text-center position-relative">
      
              <!-- Close -->
              <button class="btn btn-light position-absolute top-0 end-0 m-3" data-bs-dismiss="modal">✕</button>
      
              <!-- Prev -->
              <button class="btn btn-light position-absolute top-50 start-0 translate-middle-y" onclick="prevImage()">‹</button>
      
              <!-- Image -->
              <img id="modalImage" class="img-fluid modal-img">
      
              <!-- Next -->
              <button class="btn btn-light position-absolute top-50 end-0 translate-middle-y" onclick="nextImage()">›</button>
      
              <!-- Zoom -->
              <!-- <div class="mt-3">
                <button class="btn btn-warning" onclick="zoomImage()">Zoom</button>
              </div> -->
      
            </div>
      
          </div>
        </div>
      </div>


    <div id="footer"></div>

</div>
